# Harbor Configuration - Docker Image Registry
# Replace YOUR_SERVER_IP with your actual server IP or hostname (e.g., 192.168.1.100 or registry.example.com)
# See README.md for setup instructions

# The IP address or hostname to access Harbor UI and registry.
# DO NOT use localhost or 127.0.0.1 - Harbor must be accessible by external clients.
hostname: YOUR_SERVER_IP

# HTTP configuration (for development/testing - use HTTPS in production)
http:
  port: 80

# HTTPS configuration (uncomment for production)
# https:
#   port: 443
#   certificate: /path/to/your/certificate.crt
#   private_key: /path/to/your/private.key

# Harbor admin password (change after first login!)
harbor_admin_password: Harbor12345

# Database configuration
database:
  password: root123
  max_idle_conns: 100
  max_open_conns: 900
  conn_max_lifetime: 5m
  conn_max_idle_time: 0

# Data storage location
data_volume: /data

# Trivy vulnerability scanner (optional - disable for air-gapped)
trivy:
  ignore_unfixed: false
  skip_update: false
  skip_java_db_update: false
  offline_scan: false
  security_check: vuln
  insecure: false
  timeout: 5m0s

jobservice:
  max_job_workers: 10
  max_job_duration_hours: 24
  job_loggers:
    - STD_OUTPUT
    - FILE
  logger_sweeper_duration: 1

notification:
  webhook_job_max_retry: 3
  webhook_job_http_client_timeout: 3

log:
  level: info
  local:
    rotate_count: 50
    rotate_size: 200M
    location: /var/log/harbor

_version: 2.13.0

upload_purging:
  enabled: true
  age: 168h
  interval: 24h
  dryrun: false

cache:
  enabled: false
  expire_hours: 24
