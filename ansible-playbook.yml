---
# Ansible Playbook - Deploy Harbor Container Registry (Research Cloud / SURF)
# Component type: Ansible Playbook | Path: ansible-playbook.yml
#
# Usage:
#   ansible-playbook -i inventory.ini ansible-playbook.yml -e "harbor_hostname=YOUR_PUBLIC_IP"
#
# harbor_hostname must be the IP/hostname clients use in the browser (not 127.0.0.1).

- name: Deploy Harbor Container Registry
  hosts: harbor_servers
  become: yes
  vars:
    harbor_version: "v2.14.0"
    harbor_hostname: "{{ hostvars[inventory_hostname]['ansible_host'] | default(inventory_hostname) }}"
    harbor_install_dir: "/opt/harbor"

  pre_tasks:
    - name: Check Docker is installed
      command: docker --version
      register: docker_check
      failed_when: docker_check.rc != 0
      changed_when: false

    - name: Check Docker Compose is installed
      command: docker compose version
      register: compose_check
      failed_when: compose_check.rc != 0
      changed_when: false

  tasks:
    - name: Create Harbor install directory
      file:
        path: "{{ harbor_install_dir }}"
        state: directory
        mode: "0755"

    # So docker login/push on THIS host works over HTTP (avoids :443 connection refused)
    - name: Merge insecure-registries for Harbor hostname (HTTP)
      shell: |
        python3 << 'PY'
        import json, os
        path = "/etc/docker/daemon.json"
        host = "{{ harbor_hostname }}"
        if os.path.exists(path):
            with open(path) as f:
                try:
                    d = json.load(f)
                except json.JSONDecodeError:
                    d = {}
        else:
            d = {}
        if not isinstance(d, dict):
            d = {}
        if "insecure-registries" not in d or not isinstance(d["insecure-registries"], list):
            d["insecure-registries"] = []
        if host not in d["insecure-registries"]:
            d["insecure-registries"].append(host)
        with open(path, "w") as f:
            json.dump(d, f, indent=2)
        PY
      args:
        executable: /bin/bash
      register: daemon_merge
      changed_when: true
      notify: Restart docker

    - name: Download Harbor installer
      get_url:
        url: "https://github.com/goharbor/harbor/releases/download/{{ harbor_version }}/harbor-online-installer-{{ harbor_version }}.tgz"
        dest: "{{ harbor_install_dir }}/harbor-installer.tgz"
        mode: "0644"

    - name: Extract Harbor installer
      unarchive:
        src: "{{ harbor_install_dir }}/harbor-installer.tgz"
        dest: "{{ harbor_install_dir }}"
        remote_src: yes
        creates: "{{ harbor_install_dir }}/harbor/install.sh"

    - name: Copy harbor.yml template (HTTP-only, no https without certs)
      template:
        src: templates/harbor.yml.j2
        dest: "{{ harbor_install_dir }}/harbor/harbor.yml"
      vars:
        harbor_hostname: "{{ harbor_hostname }}"

    - name: Run Harbor prepare
      command: ./prepare
      args:
        chdir: "{{ harbor_install_dir }}/harbor"
      # Omit creates: so hostname changes re-run prepare; first run always executes.

    - name: Install Harbor
      command: ./install.sh
      args:
        chdir: "{{ harbor_install_dir }}/harbor"
      register: harbor_install
      changed_when: harbor_install.rc == 0

    - name: Display Harbor access info
      debug:
        msg:
          - "Harbor UI: http://{{ harbor_hostname }}"
          - "Login: admin / Harbor12345 (change in UI)"
          - "Image tag (no http://): {{ harbor_hostname }}/<project>/<repo>:<tag>"
          - "On this host: docker login {{ harbor_hostname }} should use HTTP now."
          - "From Mac/Colima: use push-via-ssh.sh or enable HTTPS on Harbor."

  handlers:
    - name: Restart docker
      service:
        name: docker
        state: restarted
